name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          # Minimal builds (default features: JS, Python, JSON)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: notepadx.exe
            features: ""
            suffix: "-minimal"
          # Full builds (all 20 languages)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: notepadx.exe
            features: "--features full-syntax"
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.suffix }}

      - name: Read version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libxdo-dev libgtk-3-dev libxkbcommon-dev libwayland-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build
        run: cargo build --release ${{ matrix.features }} --target ${{ matrix.target }}

      # macOS: create .app bundle
      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          APP_DIR="NotepadX.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"
          cp target/${{ matrix.target }}/release/notepadx "$APP_DIR/MacOS/NotepadX"
          cp assets/logo.icns "$APP_DIR/Resources/AppIcon.icns"
          cat > "$APP_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NotepadX</string>
            <key>CFBundleDisplayName</key>
            <string>NotepadX</string>
            <key>CFBundleIdentifier</key>
            <string>com.notepadx.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>NotepadX</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

      - name: Zip macOS .app
        if: runner.os == 'macOS'
        run: zip -r NotepadX-${{ matrix.target }}${{ matrix.suffix }}.zip NotepadX.app

      - name: Upload macOS .app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadX-${{ matrix.target }}${{ matrix.suffix }}.app
          path: NotepadX-${{ matrix.target }}${{ matrix.suffix }}.zip

      # Linux / Windows: upload raw binary
      - name: Upload binary
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notepadx-${{ matrix.target }}${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libxkbcommon-dev libwayland-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxdo-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy (minimal)
        run: cargo clippy -- -D warnings

      - name: Run clippy (full-syntax)
        run: cargo clippy --features full-syntax -- -D warnings

      - name: Run tests (minimal)
        run: cargo test --lib --test integration_tests

      - name: Run tests (full-syntax)
        run: cargo test --features full-syntax --lib --test integration_tests
