name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0). Must already exist.'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          # Minimal builds (default features: JS, Python, JSON)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: notepadx
            features: ""
            suffix: "-minimal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: notepadx.exe
            features: ""
            suffix: "-minimal"
          # Full builds (all 20 languages)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: notepadx
            features: "--features full-syntax"
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: notepadx.exe
            features: "--features full-syntax"
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.suffix }}

      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ inputs.tag }}"

      - name: Resolve tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libxkbcommon-dev libwayland-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxdo-dev

      - name: Build
        run: cargo build --release ${{ matrix.features }} --target ${{ matrix.target }}

      # macOS: create .app bundle
      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          APP_DIR="NotepadX.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"
          cp target/${{ matrix.target }}/release/notepadx "$APP_DIR/MacOS/NotepadX"
          cp assets/logo.icns "$APP_DIR/Resources/AppIcon.icns"
          cat > "$APP_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NotepadX</string>
            <key>CFBundleDisplayName</key>
            <string>NotepadX</string>
            <key>CFBundleIdentifier</key>
            <string>com.notepadx.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>NotepadX</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

      - name: Zip macOS .app
        if: runner.os == 'macOS'
        run: zip -r NotepadX-${{ matrix.target }}${{ matrix.suffix }}.zip NotepadX.app

      - name: Upload macOS .app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadX-${{ matrix.target }}${{ matrix.suffix }}.app
          path: NotepadX-${{ matrix.target }}${{ matrix.suffix }}.zip

      # Linux: create .deb package
      - name: Create Linux .deb package
        if: runner.os == 'Linux'
        run: |
          PKG_ROOT="deb-build/notepadx_${VERSION}_amd64"
          mkdir -p "$PKG_ROOT/DEBIAN" "$PKG_ROOT/usr/bin" "$PKG_ROOT/usr/share/applications" "$PKG_ROOT/usr/share/pixmaps"
          cp target/${{ matrix.target }}/release/notepadx "$PKG_ROOT/usr/bin/notepadx"
          cp assets/logo.png "$PKG_ROOT/usr/share/pixmaps/notepadx.png"
          cat > "$PKG_ROOT/DEBIAN/control" <<CTRL
          Package: notepadx
          Version: $VERSION
          Section: editors
          Priority: optional
          Architecture: amd64
          Maintainer: NotepadX Team <maintainers@notepadx.dev>
          Depends: libgtk-3-0, libglib2.0-0, libxdo3
          Description: Fast native text editor with GPU rendering
           NotepadX is a Rust-built native text editor focused on performance,
           modern UX, and large-file editing workflows.
          CTRL
          sed -i 's/^          //' "$PKG_ROOT/DEBIAN/control"
          cat > "$PKG_ROOT/usr/share/applications/notepadx.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=NotepadX
          Comment=Fast native text editor
          Exec=notepadx
          Icon=notepadx
          Terminal=false
          Categories=Utility;TextEditor;Development;
          StartupNotify=true
          DESKTOP
          sed -i 's/^          //' "$PKG_ROOT/usr/share/applications/notepadx.desktop"
          chmod 755 "$PKG_ROOT/usr/bin/notepadx"
          dpkg-deb --build --root-owner-group "$PKG_ROOT" "notepadx_${VERSION}_amd64${{ matrix.suffix }}.deb"

      - name: Upload .deb package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: notepadx-deb${{ matrix.suffix }}
          path: notepadx_${{ env.VERSION }}_amd64${{ matrix.suffix }}.deb

      # Linux / Windows: upload raw binary
      - name: Upload binary
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notepadx-${{ matrix.target }}${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Move and rename macOS apps (full)
          if [ -f artifacts/NotepadX-x86_64-apple-darwin.app/NotepadX-x86_64-apple-darwin.zip ]; then
            mv artifacts/NotepadX-x86_64-apple-darwin.app/NotepadX-x86_64-apple-darwin.zip release-assets/NotepadX-macos-x86_64.zip
          fi
          if [ -f artifacts/NotepadX-aarch64-apple-darwin.app/NotepadX-aarch64-apple-darwin.zip ]; then
            mv artifacts/NotepadX-aarch64-apple-darwin.app/NotepadX-aarch64-apple-darwin.zip release-assets/NotepadX-macos-arm64.zip
          fi
          # Move and rename macOS apps (minimal)
          if [ -f "artifacts/NotepadX-x86_64-apple-darwin-minimal.app/NotepadX-x86_64-apple-darwin-minimal.zip" ]; then
            mv "artifacts/NotepadX-x86_64-apple-darwin-minimal.app/NotepadX-x86_64-apple-darwin-minimal.zip" release-assets/NotepadX-macos-x86_64-minimal.zip
          fi
          if [ -f "artifacts/NotepadX-aarch64-apple-darwin-minimal.app/NotepadX-aarch64-apple-darwin-minimal.zip" ]; then
            mv "artifacts/NotepadX-aarch64-apple-darwin-minimal.app/NotepadX-aarch64-apple-darwin-minimal.zip" release-assets/NotepadX-macos-arm64-minimal.zip
          fi
          # Move Linux binary (full)
          if [ -f artifacts/notepadx-x86_64-unknown-linux-gnu/notepadx ]; then
            mv artifacts/notepadx-x86_64-unknown-linux-gnu/notepadx release-assets/notepadx-linux-x86_64
          fi
          # Move Linux binary (minimal)
          if [ -f artifacts/notepadx-x86_64-unknown-linux-gnu-minimal/notepadx ]; then
            mv artifacts/notepadx-x86_64-unknown-linux-gnu-minimal/notepadx release-assets/notepadx-linux-x86_64-minimal
          fi
          # Move Windows binary (full)
          if [ -f artifacts/notepadx-x86_64-pc-windows-msvc/notepadx.exe ]; then
            mv artifacts/notepadx-x86_64-pc-windows-msvc/notepadx.exe release-assets/notepadx-windows-x86_64.exe
          fi
          # Move Windows binary (minimal)
          if [ -f artifacts/notepadx-x86_64-pc-windows-msvc-minimal/notepadx.exe ]; then
            mv artifacts/notepadx-x86_64-pc-windows-msvc-minimal/notepadx.exe release-assets/notepadx-windows-x86_64-minimal.exe
          fi
          # Move Linux .deb (full)
          if [ -f artifacts/notepadx-deb/notepadx_*_amd64.deb ]; then
            cp artifacts/notepadx-deb/notepadx_*_amd64.deb release-assets/
          fi
          # Move Linux .deb (minimal)
          if [ -f artifacts/notepadx-deb-minimal/notepadx_*_amd64-minimal.deb ]; then
            cp artifacts/notepadx-deb-minimal/notepadx_*_amd64-minimal.deb release-assets/
          fi
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          tag_name: ${{ env.TAG }}
          prerelease: ${{ contains(env.TAG, '-alpha') || contains(env.TAG, '-beta') || contains(env.TAG, '-rc') }}
